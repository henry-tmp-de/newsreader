server:
  port: 8080

spring:
  application:
    name: newsreader-backend
  datasource:
    url: jdbc:mysql://localhost:3306/newsreader?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 2
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath*:/mapper/*.xml
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT configuration
jwt:
  secret: newsreader-secret-key-2024-please-change-in-production-environment-256bits
  expiration: 86400000  # 24 hours in ms

# NewsAPI configuration (get free key at https://newsapi.org)
news-api:
  key: your_newsapi_key
  base-url: https://newsapi.org/v2

# OpenAI configuration
openai:
  api-key: your_openai_api_key
  base-url: https://api.openai.com/v1
  model: gpt-4o-mini
  max-tokens: 2000

logging:
  level:
    com.newsreader: DEBUG
    org.springframework.security: INFO
